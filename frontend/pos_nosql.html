<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>POS System (NoSQL)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-8 flex gap-6 h-screen overflow-hidden">
    <div class="w-2/3">
        <h1 class="text-3xl font-bold mb-6 text-blue-800">ระบบสั่งเครื่องดื่ม (MongoDB)</h1>
        <div id="menu-list" class="grid grid-cols-3 gap-4 overflow-auto pb-10"></div>
    </div>

    <div class="w-1/3 bg-white p-6 shadow-xl rounded-2xl flex flex-col h-full">
        <h2 class="text-2xl font-bold mb-4 border-b pb-2">ตะกร้าสินค้า</h2>

        <input type="text" id="customer_name" placeholder="ชื่อลูกค้า (เว้นว่างได้)" class="w-full p-3 border rounded-lg mb-4 focus:outline-blue-500">

        <div id="cart-list" class="flex-1 overflow-auto bg-gray-50 p-2 rounded-lg border"></div>

        <div id="total-price" class="text-4xl font-bold text-right mt-4 text-green-600">รวม: 0 ฿</div>

        <button onclick="checkoutReal()" class="w-full py-4 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-xl text-2xl mt-4 transition shadow-lg">ชำระเงิน</button>
    </div>
    <script>
        let menus = [];
        let cart = [];

        async function loadData() {
            try {
                const res = await fetch('http://localhost:3000/api/nosql/menus');
                const json = await res.json();
                menus = json.data;
                document.getElementById('menu-list').innerHTML = menus.map((m, index) => `
                    <button onclick="addToCart(${index})" class="bg-white p-6 rounded-xl shadow-sm border hover:border-blue-500 text-left transition">
                        <div class="font-bold text-lg">${m.menu_name}</div>
                        <div class="text-blue-600 font-bold mt-2">${m.price} ฿</div>
                    </button>
                `).join('');
            } catch (e) {
                alert("ดึงข้อมูลเมนูไม่ได้");
            }
        }

        function addToCart(index) {
            const selected = menus[index];
            cart.push({
                menu_id: selected._id,
                menu_name: selected.menu_name,
                price: Number(selected.price)
            });
            renderCart();
        }

        function renderCart() {
            let total = 0;
            const cartDiv = document.getElementById('cart-list');

            if (cart.length === 0) {
                cartDiv.innerHTML = "<div class='text-gray-400 text-center mt-4'>ยังไม่มีสินค้า...</div>";
                document.getElementById('total-price').innerText = "รวม: 0 ฿";
                return;
            }

            cartDiv.innerHTML = cart.map((item, i) => {
                total += item.price;
                return `
                    <div class="flex justify-between border-b border-gray-200 py-3 px-2">
                        <div class="font-medium">${item.menu_name}</div>
                        <div class="flex gap-4">
                            <span class="text-blue-600 font-bold">${item.price} ฿</span>
                            <button onclick="cart.splice(${i}, 1); renderCart();" class="text-red-500 font-bold hover:text-red-700">X</button>
                        </div>
                    </div>`;
            }).join('');
            document.getElementById('total-price').innerText = `รวม: ${total} ฿`;
        }

        async function checkoutReal() {
            if (cart.length === 0) return alert("ตะกร้าว่างเปล่า");
            const customer_name = document.getElementById('customer_name').value;

            try {
                const res = await fetch('http://localhost:3000/api/nosql/orders', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        customer_name,
                        items: cart
                    })
                });
                const data = await res.json();

                if (res.ok) {
                    alert(data.message);
                    cart = [];
                    document.getElementById('customer_name').value = '';
                    renderCart();
                } else {
                    alert("เกิดข้อผิดพลาด: " + data.error);
                }
            } catch (e) {
                alert('ติดต่อเซิร์ฟเวอร์ไม่ได้');
            }
        }

        loadData();
        renderCart();
    </script>
</body>

</html>
