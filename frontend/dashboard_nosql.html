<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <title>Dashboard (NoSQL)</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 p-8">
    <div class="max-w-5xl mx-auto">
        <h1 class="text-4xl font-bold mb-8 text-blue-800">แดชบอร์ดสรุปยอดขาย (MongoDB)</h1>

        <div class="grid grid-cols-2 gap-8">
            <div class="bg-white p-8 rounded-2xl shadow-xl border-t-4 border-green-500">
                <h2 class="text-xl text-gray-500 font-bold">ยอดขายรวมทั้งหมด</h2>
                <div id="total-revenue" class="text-6xl font-black text-green-600 mt-4">0 ฿</div>
                <div id="total-bills" class="text-xl text-gray-500 mt-4 bg-gray-100 inline-block px-4 py-1 rounded-full">จาก 0 บิล</div>
            </div>

            <div class="bg-white p-8 rounded-2xl shadow-xl border-t-4 border-yellow-500">
                <h2 class="text-xl text-gray-500 font-bold mb-6">5 อันดับเมนูขายดี</h2>
                <ul id="top-menus" class="space-y-4 text-lg font-bold text-gray-700">
                </ul>
            </div>
        </div>
    </div>

    <script>
        async function loadReport() {
            try {
                const res = await fetch('http://localhost:3000/api/nosql/reports');
                const data = await res.json();

                document.getElementById('total-revenue').innerText = (data.summary.total_revenue || 0).toLocaleString() + ' ฿';
                document.getElementById('total-bills').innerText = `จาก ${data.summary.total_bills || 0} บิล`;

                if (data.top_menus.length === 0) {
                    document.getElementById('top-menus').innerHTML = "<li class='text-gray-400 font-normal'>ยังไม่มีข้อมูลการขาย</li>";
                } else {
                    document.getElementById('top-menus').innerHTML = data.top_menus.map((m, index) => `
                        <li class="flex justify-between items-center border-b pb-3 border-gray-100">
                            <span class="flex items-center gap-3">
                                <span class="bg-yellow-100 text-yellow-700 w-8 h-8 flex items-center justify-center rounded-full text-sm">${index + 1}</span>
                                ${m.menu_name}
                            </span> 
                            <span class="text-blue-600 bg-blue-50 px-3 py-1 rounded-lg">${m.qty_sold} แก้ว</span>
                        </li>
                    `).join('');
                }
            } catch (e) {
                alert("ติดต่อเซิร์ฟเวอร์ไม่ได้");
            }
        }

        loadReport();
    </script>
</body>

</html>
